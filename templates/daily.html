<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daily Paper Digest · {{ date }}</title>
  </head>
  <body>
    <main>
      <h1>Daily Paper Digest</h1>
      <p>{{ date }}</p>

      {% if papers.length === 0 %}
      <p>No matched papers yet.</p>
      {% endif %}

      {% for paper in papers %}
      <article>
        <h2><a href="{{ paper.url }}">{{ paper.title }}</a></h2>
        <p>{{ paper.journal }} · {{ paper.publishedDate }}</p>
      </article>
      {% endfor %}
    </main>
  </body>
</html>
