name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Tests
        run: npm test
        env:
          ROUTE_LIFE_SCIENCE: "1"
          ENABLE_LLM_DIGEST: "1"
          ROUTING_LLM_API_KEY: test-routing-key
          DIGEST_LLM_API_KEY: test-digest-key
          ROUTING_LLM_MODEL: test-model
          DIGEST_LLM_MODEL: test-model
