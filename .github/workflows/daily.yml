name: Daily Paper Digest

on:
  workflow_dispatch:
  schedule:
    # 18:00 Asia/Taipei (10:00 UTC) — later run to catch bioRxiv/RSS posts indexed after morning
    - cron: "0 10 * * *"

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Taipei
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
      # fromEmail / fromName / subjectPrefix: config/email.json (env overrides optional)
      # Resend test mode (onboarding@resend.dev): only this inbox receives mail until a domain is verified
      RESEND_ACCOUNT_EMAIL: ${{ secrets.RESEND_ACCOUNT_EMAIL }}
      DEBUG_NORMALIZED: "0"
      ROUTE_LIFE_SCIENCE: "1"
      ROUTING_LLM_API_KEY: ${{ secrets.ROUTING_LLM_API_KEY }}
      ROUTING_LLM_MODEL: ${{ secrets.ROUTING_LLM_MODEL }}
      ENABLE_LLM_DIGEST: "1"
      DIGEST_LLM_API_KEY: ${{ secrets.DIGEST_LLM_API_KEY }}
      DIGEST_LLM_MODEL: ${{ secrets.DIGEST_LLM_MODEL || secrets.ROUTING_LLM_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve report date
        id: report
        run: |
          REPORT_DATE="$(node --import tsx -e "import { defaultReportDateInTaipei } from './src/date.ts'; console.log(defaultReportDateInTaipei())")"
          echo "date=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "Report date: ${REPORT_DATE}"

      - name: Collect papers
        run: npm run dev -- --date "${{ steps.report.outputs.date }}"

      - name: Log digest stats
        run: |
          FILE="data/processed/${{ steps.report.outputs.date }}/papers.json"
          node --import tsx -e "
            import { readFile } from 'node:fs/promises';
            const data = JSON.parse(await readFile('${FILE}', 'utf8'));
            const d = data.digest ?? {};
            console.log('papers:', data.papers.length);
            console.log('digest tagging:', d.tagging);
            console.log('digest selection:', d.selection);
            console.log('digest summarize:', d.summarize);
            console.log('digest translate:', d.translate);
          "

      - name: Update public preview (GitHub Pages)
        run: npm run write-preview -- --date "${{ steps.report.outputs.date }}"

      - name: Upload papers artifact
        uses: actions/upload-artifact@v4
        with:
          name: papers-${{ steps.report.outputs.date }}
          path: data/processed/${{ steps.report.outputs.date }}/papers.json
          if-no-files-found: error
          retention-days: 30

      - name: Prune daily output older than 30 days
        run: npm run prune-retention -- --date "${{ steps.report.outputs.date }}" --days 30

      - name: Commit processed data and preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/processed docs
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily digest data and preview for ${{ steps.report.outputs.date }}"
            git push
          fi

      - name: Send digest email
        continue-on-error: true
        run: npm run send-digest -- --date "${{ steps.report.outputs.date }}"
